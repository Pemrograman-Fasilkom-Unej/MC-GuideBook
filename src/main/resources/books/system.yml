title: "Basic System and Commands"
author: "System"
pages:
  - "§6<System>§0\nThis server uses a time-based playtime system. You have a limited playtime of §d2 hours§0 on weekdays and §d4 hours§0 on weekends.\nYou can check your remaining time by pressing §6TAB§0 or using §6/playtime§0. §4Death§0 will consume additional playtime (stacks up to §d5§0 times)."
  - "Use §6/playtime hud §7<type> §0to change how your playtime limit is displayed.\nYou can restore your daily playtime by exchanging the currency §2Timerald§0 at the §6/timerald§0 shop.\nObtain Timeralds by using §6/deposit§0 or §6RIGHT CLICKING§0 while holding an Emerald." 
  - "You can withdraw §2Timeralds§0 back into items by using §6/withdraw §7<number:max64>§0 with an empty hand."
  - "Players can browse other players' shops using §6/shop§0.\nHold an item and use §6/shop sell §7<price> @§7<pcs> §0to list your item for sale.\nUse §6/shop cancel §7<id>§0 to cancel a listing."
  - "Manage your shop via §6/shop my§0 and access your item stash with §6/shop stash§0.\n§c*)§8 You must pay §212 Timeralds§8 once to become a merchant and sell items."
  - "§6<Job System>§0\nProgression is handled via the §lJob-MMO§r system! Open your Skill Menu by pressing §6/skill§0.\nYou can level up Jobs like Miner, Farmer, or Hunter to gain permanent stats. You may only select ONE Primary Job at a time for bonus attributes!\nUse §6Shift+F§0 to open skill menu."
  - "§6<Party System>§0\nType §6/party create <tag>§0 to make a party and §6/party invite <player>§0 to group up! Use §6/party gui§0 to open a tracker menu and click a friend's head to be guided to them via magical particles!"
  - "Party members cannot damage each other (Friendly Fire is off). When a party member earns Job XP, nearby party members receive a 50% XP share! Use §6/pc <msg>§0 for private party chat."
  - "§6<Rune Raids>§0\nLegendary Mobs occasionally drop Summoning Scrolls (like the §5Eikthyr Scroll§0).\nRight-click these scrolls to summon an Army Raid and a powerful Boss! Raid boss kills drop powerful custom Runes and Emeralds."
  - "If you summon a Boss Raid while in a Party, ONLY your party members will receive the final Rune and Emeralds. Bystanders cannot steal your boss loot!"
  - "§6<Death Spirit>§0\nCaution! When you die, your items are placed in a locked chest that lasts for §f10§0 minutes.\nA powerful hostile Remnant of your spirit will spawn guarding it. You must defeat your Remnant to reclaim your items safely!"
  - "If you lose track of where you died, use §6/dc track§0 to get a magical compass path straight to your Death Chest! Use §6/dc stop§0 when you find it."
  - "To track your entity exploration §6/mobcodex§0 will show any mob you killed per world."
  - "Use §6/guide §7<name>§0 to open different books."
